<!DOCTYPE html>

<title>Расчёт прорезов</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#1f1f1f;

    -apple-system,

    width:150px;

    font-size:34px;

<body>

<div class="app">

<div class="title">
📐 Расчёт прорезов
</div>

<div class="panel">

<textarea id="input"
placeholder="30x20 — 350
40x30 — 350
70x50 — 400"></textarea>

<div class="buttons">

<button
class="btn-main"
onclick="calc()">
Рассчитать
</button>

<button
class="btn-clear"
onclick="clearAll()">
Очистить
</button>

<button
class="btn-share"
onclick="shareResult()">
📤 Поделиться
</button>

</div>

<div class="copy">
26 реек = 1 прорез
</div>

</div>

<div id="results" class="results"></div>

</div>

<script>

const REIKA = 270;

const LOAD = 26;

let shareText = '';

function parseInput(text){

    const items = [];

    text
    .split('\n')
    .forEach(line=>{

        const m = line.match(
        /(\d+)\s*[xх×]\s*(\d+)\s*[-—–]\s*(\d+)/i
        );

        if(m){

            items.push({

                w:+m[1],

                h:+m[2],

                q:+m[3]
            });
        }
    });

    return items;
}

function calc(){

    const input =
    document
    .getElementById('input')
    .value
    .trim();

    if(!input){

        alert('Введите заказ');

        return;
    }

    const items = parseInput(input);

    if(!items.length){

        alert('Неверный формат');

        return;
    }

    const need = {};

    items.forEach(it=>{

        need[it.w] =
        (need[it.w] || 0)
        + (it.q * 2);

        need[it.h] =
        (need[it.h] || 0)
        + (it.q * 2);
    });

    const cuts = {};

    const details = {};

    Object.keys(need).forEach(key=>{

        const sz = +key;

        const totalDetails =
        need[sz];

        const perReika =
        Math.floor(REIKA / sz);

        const reiki =
        Math.ceil(
            totalDetails / perReika
        );

        const propili =
        Math.ceil(
            reiki / LOAD
        );

        cuts[sz] = propili;

        details[sz] = {

            details:
            totalDetails,

            perReika:
            perReika,

            reiki:
            reiki,

            propili:
            propili
        };
    });

    const counted = {};

    let html = '';

    let total = 0;

    shareText =
    '📐 План прорезов\n\n';

    items.forEach(it=>{

        let cw = 0;

        let ch = 0;

        if(!counted[it.w]){

            cw = cuts[it.w];

            counted[it.w] = true;
        }

        if(!counted[it.h]){

            ch = cuts[it.h];

            counted[it.h] = true;
        }

        total += cw + ch;

        const dw = details[it.w];

        const dh = details[it.h];

        html += `

        <div class="card">

            <div class="card-title">
            📏 ${it.w}×${it.h}
            — ${it.q} шт.
            </div>

            <div class="row">

                <span>
                Прорезов в ${it.w}
                </span>

                <span class="green">
                ${cw}
                </span>

            </div>

            <div class="row">

                <span>
                Прорезов в ${it.h}
                </span>

                <span class="green">
                ${ch}
                </span>

            </div>

            <div class="detail">

            ${it.w}см:
            деталей ${dw.details},
            ${dw.perReika} шт/рейка,
            реек ${dw.reiki},
            прорезов ${dw.propili}

            <br><br>

            ${it.h}см:
            деталей ${dh.details},
            ${dh.perReika} шт/рейка,
            реек ${dh.reiki},
            прорезов ${dh.propili}

            </div>

        </div>
        `;

        shareText +=
        `📏 ${it.w}×${it.h} — ${it.q} шт.\n` +

        `• ${it.w}см → ${cw} прорезов\n` +

        `• ${it.h}см → ${ch} прорезов\n\n`;
    });

    html += `

    <div class="summary">

        🔪 Всего прорезов:
        ${total}

    </div>
    `;

    shareText +=
    `🔪 Всего прорезов: ${total}`;

    document
    .getElementById('results')
    .innerHTML = html;
}

function shareResult(){

    if(!shareText){

        alert(
        'Сначала сделайте расчёт'
        );

        return;
    }

    if(navigator.share){

        navigator.share({

            title:
            'План прорезов',

            text:
            shareText
        });
    }
    else{

        navigator.clipboard
        .writeText(shareText);

        alert(
        'Текст скопирован'
        );
    }
}

function clearAll(){

    document
    .getElementById('input')
    .value = '';

    document
    .getElementById('results')
    .innerHTML = '';

    shareText = '';
}

</script>

</body>
</html>
