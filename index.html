<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Раскрой МДФ">
    <title>Раскрой МДФ</title>
    <style>
        /* ----- Сброс и переменные ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* светлая тема (по умолчанию) */
            --bg: #f5f5f7;
            --card: #ffffff;
            --text-primary: #1d1c1f;
            --text-secondary: #6c6c70;
            --accent: #007aff;
            --accent-pressed: #005fc1;
            --border: #e9e9ef;
            --success: #34c759;
            --waste-bg: #e9e9ef;
            --waste-text: #8e8e93;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.04), 0 0 0 0.5px rgba(0, 0, 0, 0.02);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #1c1c1e;
                --text-primary: #ffffff;
                --text-secondary: #98989e;
                --accent: #0a84ff;
                --accent-pressed: #409cff;
                --border: #2c2c2e;
                --success: #32d74b;
                --waste-bg: #2c2c2e;
                --waste-text: #8e8e93;
                --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2), 0 0 0 0.5px rgba(255, 255, 255, 0.02);
                --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.02);
            }
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            line-height: 1.45;
            padding: 20px 16px 32px 16px;
            -webkit-font-smoothing: antialiased;
        }

        /* карточки */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            transition: all 0.2s ease;
            border: none;
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        label {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        textarea, input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 17px;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", monospace;
            color: var(--text-primary);
            transition: all 0.1s ease;
            margin-bottom: 20px;
            outline: none;
            -webkit-appearance: none;
        }

        textarea:focus, input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        textarea {
            font-family: ui-monospace, SF Mono, monospace;
            font-size: 15px;
            line-height: 1.4;
            resize: vertical;
            min-height: 120px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-group > div {
            flex: 1;
            min-width: 100px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.15s ease;
            margin-top: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            background: var(--accent-pressed);
            transform: scale(0.98);
        }

        .btn-copy {
            background: var(--success);
            color: #000;
            margin-top: 20px;
            box-shadow: var(--shadow-sm);
        }
        .btn-copy:active {
            background: #25a645;
            transform: scale(0.98);
        }

        /* Статистика */
        .stat-box {
            background: var(--bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }
        .stat-box h3 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .stat-box p {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* визуальная планка */
        .visual-slat {
            height: 44px;
            background: var(--waste-bg);
            display: flex;
            margin: 16px 0 12px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid var(--border);
        }
        .slat-part {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            height: 100%;
            background: var(--accent);
            color: white;
            border-right: 0.5px solid rgba(0,0,0,0.05);
        }
        .color-waste {
            background: var(--waste-bg);
            color: var(--waste-text);
            font-weight: 500;
        }

        .instruction-card {
            background: var(--bg);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 16px;
            border: 0.5px solid var(--border);
            transition: all 0.1s;
        }
        .instruction-card span {
            font-weight: 600;
            font-size: 17px;
        }

        #text_for_whatsapp {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            font-family: ui-monospace, SF Mono, monospace;
            font-size: 14px;
            color: var(--text-primary);
            margin-top: 16px;
            display: none;
            resize: vertical;
        }

        /* скролл */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c6c6c8;
            border-radius: 10px;
        }
        @media (prefers-color-scheme: dark) {
            ::-webkit-scrollbar-thumb {
                background: #38383a;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>📐 Раскрой МДФ</h2>
        
        <label>Заказ (ШхВ - Кол-во):</label>
        <textarea id="order_input" inputmode="text">30х20 - 350
40х25 - 200</textarea>
        
        <div class="input-group">
            <div><label>Рейка (см):</label><input type="number" id="slat_len" value="272" inputmode="decimal" step="any"></div>
            <div><label>В пачке (шт):</label><input type="number" id="pack_size" value="26" inputmode="numeric"></div>
            <div><label>Диск (мм):</label><input type="number" id="blade" value="3" inputmode="decimal" step="any"></div>
        </div>
        
        <button onclick="run()">Рассчитать</button>
    </div>

    <div class="card" id="results" style="display: none;">
        <div id="stats_area"></div>
        <textarea id="text_for_whatsapp" readonly></textarea>
        <button class="btn-copy" id="copy_btn" onclick="copyText()">📋 Скопировать для WhatsApp</button>
        <div id="map_area" style="margin-top: 20px;"></div>
    </div>

<script>
function run() {
    try {
        var text = document.getElementById('order_input').value;
        var slatLen = parseFloat(document.getElementById('slat_len').value);
        var packSize = parseInt(document.getElementById('pack_size').value);
        var blade = parseFloat(document.getElementById('blade').value) / 10;
        
        if (!text.trim()) { alert("Введите данные заказа!"); return; }
        if (isNaN(slatLen) || slatLen <= 0) { alert("Укажите длину рейки > 0"); return; }
        if (isNaN(packSize) || packSize <= 0) packSize = 1;

        var regex = /(\d+(?:\.\d+)?)[\sхxX×*](\d+(?:\.\d+)?)[\s\-:=]+(\d+)/g;
        var match; var demands = {};
        while ((match = regex.exec(text)) !== null) {
            var w = parseFloat(match[1]); var h = parseFloat(match[2]); var qty = parseInt(match[3]);
            demands[w] = (demands[w] || 0) + (qty * 2); demands[h] = (demands[h] || 0) + (qty * 2);
        }
        
        var hasDemands = false;
        for (var k in demands) { if (demands.hasOwnProperty(k)) { hasDemands = true; break; } }
        if (!hasDemands) { alert("Неверный формат. Пример: 30х20 - 350"); return; }
        
        var uniqueLengths = [];
        for (var k in demands) {
            if (demands.hasOwnProperty(k) && demands[k] > 0) { uniqueLengths.push(Number(k)); }
        }
        uniqueLengths.sort(function(a, b) { return b - a; });
        
        var patterns = []; 
        var currentPattern = [];
        for (var i = 0; i < uniqueLengths.length; i++) { currentPattern.push(0); }
        
        function gen(idx, curLen) {
            if(idx === uniqueLengths.length) { if(curLen > 0) patterns.push(currentPattern.slice()); return; }
            var len = uniqueLengths[idx];
            var maxP = Math.floor((slatLen - curLen) / (len + blade));
            for(var i=maxP; i>=0; i--) { currentPattern[idx] = i; gen(idx+1, curLen + i*(len+blade)); }
        }
        gen(0,0);
        
        var remaining = {};
        for (var k in demands) { if (demands.hasOwnProperty(k)) { remaining[k] = demands[k]; } }
        
        function hasRemainingItems(rem) {
            for (var k in rem) { if (rem.hasOwnProperty(k) && rem[k] > 0) return true; }
            return false;
        }
        
        var plan = []; var safety = 0;
        
        while(hasRemainingItems(remaining) && safety++ < 2000) {
            var bestP = null; var bestScore = -Infinity;
            
            for(var idxP=0; idxP<patterns.length; idxP++) {
                var p = patterns[idxP];
                var score = 0; var used = 0; var hits = false;
                
                for(var i=0; i<uniqueLengths.length; i++) {
                    var len = uniqueLengths[i]; var cnt = p[i]; if(cnt===0) continue;
                    used += cnt * (len+blade);
                    if(remaining[len] > 0) { 
                        score += Math.min(cnt, remaining[len]) * len; 
                        hits = true; 
                    }
                }
                if(!hits) continue;
                
                var rest = slatLen - used;
                score -= rest;
                
                if(score > bestScore) { bestScore = score; bestP = p; }
            }
            if(!bestP) break;
            
            var steps = 999999;
            for(var i=0; i<uniqueLengths.length; i++) {
                if(bestP[i] > 0 && remaining[uniqueLengths[i]] > 0) {
                    steps = Math.min(steps, Math.ceil(remaining[uniqueLengths[i]] / bestP[i]));
                }
            }
            if(steps === 999999) steps = 1;
            for(var i=0; i<uniqueLengths.length; i++) remaining[uniqueLengths[i]] -= bestP[i] * steps;
            plan.push({pattern: bestP, count: steps});
        }
        
        var total = 0; 
        for (var i = 0; i < plan.length; i++) { total += plan[i].count; }
        
        var packs = Math.floor(total/packSize); var loose = total % packSize;
        
        var waText = "📦 ЗАКАЗ В РАСПИЛ\nВсего реек: " + total + " шт (" + packs + " пач. + " + loose + " шт.)\n";
        waText += "\n🛠 КАРТА РАСПИЛА:\n";

        var statsHtml = '<div class="stat-box">' +
            '<h3>' + total + ' шт</h3>' +
            '<p>' + packs + ' пачек + ' + loose + ' отдельно</p></div>';
        document.getElementById('stats_area').innerHTML = statsHtml;
        
        var html = '<h3 style="font-size: 20px; font-weight: 600; margin-bottom: 16px; letter-spacing: -0.2px;">Схема распила</h3>';
        for (var idx = 0; idx < plan.length; idx++) {
            var item = plan[idx];
            if (item.count === 0) continue;
            
            var p = Math.floor(item.count/packSize); var l = item.count%packSize;
            var countTxt = p>0 ? (p + ' пач.' + (l>0 ? ' и ' + l + ' шт.' : '')) : (l + ' шт.');
            waText += "\n" + (idx+1) + ". Пилить: " + countTxt + " (всего " + item.count + " реек)\nСхема: ";
            
            var visual = '<div class="visual-slat">'; var used = 0;
            var parts = [];
            for(var i=0; i<uniqueLengths.length; i++) {
                for(var c=0; c<item.pattern[i]; c++) {
                    visual += '<div class="slat-part" style="flex-grow: ' + uniqueLengths[i] + '">' + uniqueLengths[i] + '</div>';
                    used += uniqueLengths[i] + blade;
                    parts.push(uniqueLengths[i]);
                }
            }
            waText += parts.join(' + ') + '\n';
            
            var rest = slatLen - used;
            if(rest > 0.1) visual += '<div class="slat-part color-waste" style="flex-grow: ' + rest + '">' + rest.toFixed(1) + '</div>';
            visual += '</div>';
            
            html += '<div class="instruction-card">' +
                '<span style="color: var(--accent);">Рез №' + (idx+1) + '</span> — <span style="font-weight: 500;">' + countTxt + '</span>' +
                visual +
            '</div>';
        }
        
        document.getElementById('text_for_whatsapp').value = waText;
        document.getElementById('text_for_whatsapp').style.display = 'block';
        document.getElementById('map_area').innerHTML = html;
        document.getElementById('results').style.display = 'block';
        
        document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
        
    } catch(e) { alert("Ошибка: " + e.message); }
}

function copyText() {
    var textArea = document.getElementById("text_for_whatsapp");
    textArea.select();
    textArea.setSelectionRange(0, 99999);
    try {
        navigator.clipboard.writeText(textArea.value).then(() => {
            showCopyFeedback();
        }).catch(() => {
            document.execCommand("copy");
            showCopyFeedback();
        });
    } catch(e) {
        document.execCommand("copy");
        showCopyFeedback();
    }
}

function showCopyFeedback() {
    var btn = document.getElementById("copy_btn");
    var original = btn.innerHTML;
    btn.innerHTML = "✅ Скопировано!";
    setTimeout(function() {
        btn.innerHTML = original;
    }, 2000);
}
</script>
</body>
</html>
