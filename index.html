<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Расчёт прорезов</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#2b2b2b;
    color:#fff;
    font-family:Arial,sans-serif;

}

    max-width:700px;

}

    margin-bottom:15px;

}

    flex:1;

}

}

    background:#555;

    margin-top:20px;

}

    font-size:26px;

}

.row{
    display:flex;
    justify-content:space-between;

}

    color:#6dff6d;

}

    margin-top:10px;
    color:#aaa;

    font-size:14px;
}

    background:#444;
    padding:15px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

</style>
</head>

<body>

<div class="app">

<h1>📐 Расчёт прорезов</h1>

<textarea id="input" placeholder="30x20 — 350
40x30 — 350"></textarea>

<div class="buttons">

<button class="calc" onclick="calc()">
Рассчитать
</button>

<button class="clear" onclick="clearInput()">
Очистить
</button>

</div>

<div class="results" id="results"></div>

</div>

<script>

const REIKA = 270;

// 26 реек = 1 прорез

const LOAD = 26;

function parseInput(text){

    const items = [];

    text.split('\n').forEach(line=>{

        const m = line.match(
            /(\d+)\s*[xх×]\s*(\d+)\s*[-—–]\s*(\d+)/i
        );

        if(m){

            items.push({

                w:+m[1],

                h:+m[2],

                q:+m[3]
            });
        }
    });

    return items;
}

function calc(){

    const input =
        document.getElementById('input').value.trim();

    if(!input){

        alert('Введите заказ');

        return;
    }

    const items = parseInput(input);

    if(!items.length){

        alert('Неверный формат');

        return;
    }

    const results =
        document.getElementById('results');

    let html = '';

    let totalCuts = 0;

    // чтобы одинаковые размеры
    // не считать повторно

    const counted = {};

    // собираем потребность

    const need = {};

    items.forEach(it=>{

        need[it.w] =
            (need[it.w] || 0) + it.q * 2;

        need[it.h] =
            (need[it.h] || 0) + it.q * 2;
    });

    // считаем прорезы

    const cuts = {};

    const details = {};

    Object.keys(need).forEach(key=>{

        const sz = +key;

        const totalDetails = need[sz];

        // сколько деталей помещается в рейку

        const perReika =
            Math.floor(REIKA / sz);

        // сколько реек нужно

        const reiki =
            Math.ceil(
                totalDetails / perReika
            );

        // сколько прорезов

        const propili =
            Math.ceil(
                reiki / LOAD
            );

        cuts[sz] = propili;

        details[sz] = {

            details:totalDetails,

            perReika:perReika,

            reiki:reiki,

            propili:propili
        };
    });

    // вывод

    items.forEach(it=>{

        let cw = 0;
        let ch = 0;

        if(!counted[it.w]){

            cw = cuts[it.w];

            counted[it.w] = true;
        }

        if(!counted[it.h]){

            ch = cuts[it.h];

            counted[it.h] = true;
        }

        totalCuts += cw + ch;

        const dw = details[it.w];

        const dh = details[it.h];

        html += `

        <div class="card">

            <div class="title">
                📏 ${it.w}×${it.h} — ${it.q} шт.
            </div>

            <div class="row">
                <span>Прорезов в ${it.w}</span>
                <span class="green">${cw}</span>
            </div>

            <div class="row">
                <span>Прорезов в ${it.h}</span>
                <span class="green">${ch}</span>
            </div>

            <div class="detail">

                ${it.w}см:
                деталей ${dw.details},
                ${dw.perReika} шт/рейка,
                реек ${dw.reiki},
                прорезов ${dw.propili}

                <br><br>

                ${it.h}см:
                деталей ${dh.details},
                ${dh.perReika} шт/рейка,
                реек ${dh.reiki},
                прорезов ${dh.propili}

            </div>

        </div>
        `;
    });

    html += `
    <div class="summary">
        🔪 Всего прорезов: ${totalCuts}
    </div>
    `;

    results.innerHTML = html;
}

function clearInput(){

    document.getElementById('input').value='';

    document.getElementById('results').innerHTML='';
}

</script>

</body>
</html>
