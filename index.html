<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Расчёт прорезов
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
180deg,
#07111f 0%,
#0a1628 40%,
#0b0f18 100%
);

min-height:100vh;

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

color:white;

padding:18px;
}

.app{

max-width:760px;

margin:auto;
}

.header{

margin-bottom:24px;
}

.logo{

display:flex;

align-items:center;

gap:16px;
}

.logo-icon{

width:72px;

height:72px;

border-radius:22px;

background:
linear-gradient(
135deg,
#5eff7a,
#2cb7ff
);

display:flex;

justify-content:center;

align-items:center;

font-size:38px;

font-weight:900;

color:#07111f;
}

.logo-text h1{

font-size:54px;

font-weight:900;

letter-spacing:1px;
}

.logo-text p{

color:#9ba8bd;

font-size:22px;

margin-top:4px;
}

.panel{

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(20px);

border-radius:30px;

padding:22px;

margin-bottom:22px;

box-shadow:
0 20px 60px rgba(0,0,0,0.3);
}

.panel-head{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:18px;
}

.panel-title{

display:flex;

align-items:center;

gap:10px;

font-size:28px;

font-weight:800;

color:#67ff75;
}

.badge{

padding:12px 18px;

border-radius:16px;

background:
rgba(255,255,255,0.05);

color:#d6dce8;

font-size:18px;
}

textarea{

width:100%;

height:190px;

border:none;

outline:none;

resize:none;

padding:24px;

font-size:34px;

line-height:1.5;

color:white;

background:
rgba(0,0,0,0.2);

border-radius:24px;
}

.buttons{

display:flex;

gap:14px;

margin-top:18px;
}

button{

border:none;

cursor:pointer;

border-radius:22px;

padding:22px;

font-size:28px;

font-weight:800;

transition:0.2s;
}

button:active{

transform:scale(0.98);
}

.btn-main{

flex:1;

background:
linear-gradient(
135deg,
#5dff72,
#49d85d
);

color:#07111f;
}

.btn-clear{

width:220px;

background:
rgba(255,255,255,0.08);

color:white;
}

.btn-share{

width:320px;

background:
linear-gradient(
135deg,
#327bff,
#5b4dff
);

color:white;
}

.results-title{

display:flex;

align-items:center;

gap:12px;

font-size:30px;

font-weight:900;

margin-bottom:18px;

color:#c8d2e3;
}

.card{

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.06);

border-radius:30px;

padding:24px;

margin-bottom:18px;
}

.card-title{

font-size:44px;

font-weight:900;

margin-bottom:20px;
}

.row{

display:flex;

justify-content:space-between;

align-items:center;

padding:10px 0;

font-size:34px;
}

.value{

font-size:52px;

font-weight:900;

color:#67ff75;
}

.info{

margin-top:18px;

padding-top:18px;

border-top:
1px solid rgba(255,255,255,0.08);

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;
}

.info-box{

font-size:23px;

line-height:1.6;

color:#a8b2c2;
}

.summary{

margin-top:28px;

background:
linear-gradient(
135deg,
rgba(94,255,122,0.12),
rgba(50,123,255,0.12)
);

border:
1px solid rgba(94,255,122,0.18);

border-radius:30px;

padding:28px;

display:flex;

justify-content:space-between;

align-items:center;
}

.summary span{

font-size:34px;

font-weight:900;
}

.summary strong{

font-size:64px;

color:#67ff75;
}

@media(max-width:700px){

.logo-text h1{

font-size:34px;
}

.logo-text p{

font-size:16px;
}

textarea{

font-size:26px;
}

.buttons{

flex-direction:column;
}

.btn-clear,
.btn-share{

width:100%;
}

.card-title{

font-size:34px;
}

.row{

font-size:26px;
}

.value{

font-size:42px;
}

.info{

grid-template-columns:1fr;
}

.summary{

flex-direction:column;

gap:12px;
}

.summary strong{

font-size:52px;
}
}

</style>

</head>

<body>

<div class="app">

<div class="header">

<div class="logo">

<div class="logo-icon">
✂
</div>

<div class="logo-text">

<h1>
РАСЧЁТ ПРОРЕЗОВ
</h1>

<p>
26 реек = 1 прорез
</p>

</div>

</div>

</div>

<div class="panel">

<div class="panel-head">

<div class="panel-title">
🧾 Введите заказ
</div>

<div class="badge">
270 см рейка
</div>

</div>

<textarea
id="input"
placeholder="30x20 — 350
40x30 — 350
70x50 — 400"></textarea>

<div class="buttons">

<button
class="btn-main"
onclick="calc()">
Рассчитать
</button>

<button
class="btn-clear"
onclick="clearAll()">
Очистить
</button>

<button
class="btn-share"
onclick="shareResult()">
📤 Поделиться планом
</button>

</div>

</div>

<div
class="results"
id="results">
</div>

</div>

<script>

const REIKA = 270;

const LOAD = 26;

let shareText = '';

function parseInput(text){

const items = [];

text
.split('\n')
.forEach(line=>{

const m = line.match(
/(\d+)\s*[xх×]\s*(\d+)\s*[-—–]\s*(\d+)/i
);

if(m){

items.push({

w:+m[1],

h:+m[2],

q:+m[3]
});
}
});

return items;
}

function calc(){

const input =
document
.getElementById('input')
.value
.trim();

if(!input){

alert('Введите заказ');

return;
}

const items =
parseInput(input);

if(!items.length){

alert('Неверный формат');

return;
}

const need = {};

items.forEach(it=>{

need[it.w] =
(need[it.w] || 0)
+ (it.q * 2);

need[it.h] =
(need[it.h] || 0)
+ (it.q * 2);
});

const cuts = {};

const details = {};

Object.keys(need).forEach(key=>{

const sz = +key;

const totalDetails =
need[sz];

const perReika =
Math.floor(
REIKA / sz
);

const reiki =
Math.ceil(
totalDetails / perReika
);

const propili =
Math.ceil(
reiki / LOAD
);

cuts[sz] = propili;

details[sz] = {

details:
totalDetails,

perReika:
perReika,

reiki:
reiki,

propili:
propili
};
});

let html = `

<div class="results-title">
📊 Результаты расчёта
</div>
`;

let total = 0;

const counted = {};

shareText =
'📐 План прорезов\n\n';

items.forEach(it=>{

let cw = 0;

let ch = 0;

if(!counted[it.w]){

cw = cuts[it.w];

counted[it.w] = true;
}

if(!counted[it.h]){

ch = cuts[it.h];

counted[it.h] = true;
}

total += cw + ch;

const dw = details[it.w];

const dh = details[it.h];

html += `

<div class="card">

<div class="card-title">
📏 ${it.w}×${it.h}
— ${it.q} шт.
</div>

<div class="row">

<span>
Прорезов в ${it.w}
</span>

<span class="value">
${cw}
</span>

</div>

<div class="row">

<span>
Прорезов в ${it.h}
</span>

<span class="value">
${ch}
</span>

</div>

<div class="info">

<div class="info-box">

${it.w}см<br>

• деталей:
${dw.details}<br>

• шт/рейка:
${dw.perReika}<br>

• реек:
${dw.reiki}<br>

• прорезов:
${dw.propili}

</div>

<div class="info-box">

${it.h}см<br>

• деталей:
${dh.details}<br>

• шт/рейка:
${dh.perReika}<br>

• реек:
${dh.reiki}<br>

• прорезов:
${dh.propili}

</div>

</div>

</div>
`;

shareText +=
`📏 ${it.w}×${it.h}
— ${it.q} шт.\n` +

`• ${it.w}см →
${cw} прорезов\n` +

`• ${it.h}см →
${ch} прорезов\n\n`;
});

html += `

<div class="summary">

<span>
🔪 Всего прорезов
</span>

<strong>
${total}
</strong>

</div>
`;

shareText +=
`\n🔪 Всего:
${total}`;

document
.getElementById('results')
.innerHTML = html;
}

function shareResult(){

if(!shareText){

alert(
'Сначала сделайте расчёт'
);

return;
}

if(navigator.share){

navigator.share({

title:
'План прорезов',

text:
shareText
});
}
else{

navigator.clipboard
.writeText(shareText);

alert(
'План скопирован'
);
}
}

function clearAll(){

document
.getElementById('input')
.value = '';

document
.getElementById('results')
.innerHTML = '';

shareText = '';
}

</script>

</body>
</html>
