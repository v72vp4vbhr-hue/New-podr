<body>

<div class="app">

<h1>📐 Расчёт прорезов</h1>

<div class="info">
<b>Рейка:</b> 270 см
</div>

<div class="stock-panel">
    <span class="stock-title">📦 Склад:</span>
    <span class="stock-list" id="stockList">пусто</span>

    <button class="btn-clear-stock" onclick="clearStock()">
        Очистить
    </button>
</div>

<label>Введите заказ:</label>

<textarea id="inputData" placeholder="30x50 — 100
20x30 — 350"></textarea>

<div class="hint">
Формат: Ширина x Высота — Количество
</div>

<div class="btn-row">

<button class="btn btn-calculate" onclick="calc()">
Рассчитать
</button>

<button class="btn btn-clear" onclick="clearInput()">
Очистить
</button>

<button class="btn btn-share" onclick="shareResult()">
📤
</button>

</div>

<div class="error" id="error"></div>

<div class="results" id="results"></div>

</div>

<script>

var REIKA = 270;

var stock = {};

var lastText = '';

function loadStock(){

    try{
        stock = JSON.parse(
            localStorage.getItem('pod_v16')
        ) || {};
    }
    catch(e){
        stock = {};
    }

    renderStock();
}

function saveStock(){

    localStorage.setItem(
        'pod_v16',
        JSON.stringify(stock)
    );

    renderStock();
}

function renderStock(){

    var list = document.getElementById('stockList');

    var arr = [];

    for(var k in stock){

        if(stock[k] > 0){

            arr.push([
                +k,
                stock[k]
            ]);
        }
    }

    list.textContent = arr.length
        ? arr
            .sort(function(a,b){
                return a[0]-b[0];
            })
            .map(function(e){
                return e[0] + 'см ×' + e[1];
            })
            .join(', ')
        : 'пусто';
}

function clearStock(){

    if(confirm('Очистить склад?')){

        stock = {};

        saveStock();
    }
}

function parseInput(text){

    var items = [];

    text.split('\n').forEach(function(line){

        var m = line.match(
            /(\d+)\s*[xх×]\s*(\d+)\s*[-—–]\s*(\d+)/i
        );

        if(m){

            items.push({
                w:+m[1],
                h:+m[2],
                q:+m[3]
            });
        }
    });

    return items;
}

function calc(){

    var input = document
        .getElementById('inputData')
        .value
        .trim();

    var errEl = document.getElementById('error');

    var resEl = document.getElementById('results');

    errEl.classList.remove('show');
    resEl.classList.remove('show');

    if(!input){

        errEl.textContent = 'Введите заказ';

        errEl.classList.add('show');

        return;
    }

    var items = parseInput(input);

    if(!items.length){

        errEl.textContent = 'Неверный формат';

        errEl.classList.add('show');

        return;
    }

    // потребность

    var need = {};

    items.forEach(function(it){

        need[it.w] =
            (need[it.w] || 0) + it.q * 2;

        need[it.h] =
            (need[it.h] || 0) + it.q * 2;
    });

    // склад

    var fromStock = {};

    for(var k in stock){

        var sz = +k;

        if(need[sz] > 0){

            var take = Math.min(
                need[sz],
                stock[k]
            );

            need[sz] -= take;

            stock[k] -= take;

            fromStock[sz] = take;
        }
    }

    // размеры

    var sizes = Object.keys(need)
        .map(Number)
        .sort(function(a,b){
            return b-a;
        });

    var cuts = {};

    var det = {};

    var leftovers = [];

    // расчёт

    sizes.forEach(function(sz){

        var needed = need[sz];

        var fromLeft = 0;

        // остатки

        var newLeft = [];

        leftovers.forEach(function(rest){

            if(needed <= 0){

                newLeft.push(rest);

                return;
            }

            if(rest >= sz){

                var can =
                    Math.floor(rest / sz);

                var take =
                    Math.min(can, needed);

                needed -= take;

                fromLeft += take;

                rest -= take * sz;
            }

            if(rest > 0){

                newLeft.push(rest);
            }
        });

        leftovers = newLeft;

        // новые рейки

        var perReika =
            Math.floor(REIKA / sz);

        var reiki = 0;

        if(needed > 0 && perReika > 0){

            reiki =
                Math.ceil(
                    needed / perReika
                );

            // ПРОРЕЗЫ = РЕЙКИ

            cuts[sz] = reiki;

            var restLen =
                REIKA -
                (perReika * sz);

            for(var i=0;i<reiki;i++){

                if(restLen > 0){

                    leftovers.push(restLen);
                }
            }
        }
        else{

            cuts[sz] = 0;
        }

        det[sz] = {

            perReika:perReika,

            reiki:reiki,

            fromLeft:fromLeft,

            fromStock:fromStock[sz] || 0
        };
    });

    // остатки на склад

    leftovers.forEach(function(rest){

        if(
            rest > 0 &&
            (
                rest < 9 ||
                (rest >= 30 && rest <= 33)
            )
        ){

            stock[rest] =
                (stock[rest] || 0) + 1;
        }
    });

    saveStock();

    // вывод

    var html = '';

    var totalCuts = 0;

    var counted = {};

    var textOut =
        '📐 Расчёт прорезов\n\n';

    items.forEach(function(it){

        var w = it.w;
        var h = it.h;
        var q = it.q;

        var cw = 0;
        var ch = 0;

        if(!counted[w]){

            cw = cuts[w] || 0;

            counted[w] = true;
        }

        if(!counted[h]){

            ch = cuts[h] || 0;

            counted[h] = true;
        }

        var sum = cw + ch;

        totalCuts += sum;

        var dw = det[w] || {};
        var dh = det[h] || {};

        html +=

        '<div class="size-block">' +

            '<div class="size-header">' +
            '📏 ' + w + '×' + h +
            ' — ' + q + ' шт.' +
            '</div>' +

            '<div class="size-row">' +
            '<span>Прорезов в ' + w + '</span>' +
            '<span class="val">' + cw + '</span>' +
            '</div>' +

            '<div class="size-row">' +
            '<span>Прорезов в ' + h + '</span>' +
            '<span class="val">' + ch + '</span>' +
            '</div>' +

            '<div class="detail">' +

            w + 'см: ' +
            (dw.perReika || 0) +
            ' шт/рейка, реек: ' +
            (dw.reiki || 0) +
            ', остатки: ' +
            (dw.fromLeft || 0) +
            ', склад: ' +
            (dw.fromStock || 0) +

            ' | ' +

            h + 'см: ' +
            (dh.perReika || 0) +
            ' шт/рейка, реек: ' +
            (dh.reiki || 0) +
            ', остатки: ' +
            (dh.fromLeft || 0) +
            ', склад: ' +
            (dh.fromStock || 0) +

            '</div>' +

        '</div>';

        textOut +=
            w + '×' + h +
            ' — ' + q +
            ' шт. → ' +
            sum +
            ' прорезов\n';
    });

    html +=

    '<div class="summary">' +

        '<div class="summary-row">' +

            '<span>🔪 Всего прорезов:</span>' +

            '<span>' +
            totalCuts +
            '</span>' +

        '</div>' +

    '</div>';

    textOut +=
        '\n🔪 Всего: ' +
        totalCuts;

    resEl.innerHTML = html;

    resEl.classList.add('show');

    lastText = textOut;
}

function shareResult(){

    if(!lastText){

        alert('Сначала рассчитайте');

        return;
    }

    if(navigator.share){

        navigator.share({
            text:lastText
        });
    }
    else{

        alert(lastText);
    }
}

function clearInput(){

    document.getElementById('inputData').value='';

    document
        .getElementById('results')
        .classList
        .remove('show');

    document
        .getElementById('error')
        .classList
        .remove('show');
}

loadStock();

</script>

</body>
</html>
