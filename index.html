<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>–†–∞—Б—З—С—В –њ—А–Њ—А–µ–Ј–Њ–≤</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #2c2c2c;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.app {
    background: #3a3a3a;
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
h1 { color: #e0e0e0; text-align: center; margin-bottom: 14px; font-size: 22px; }
.info { background: #333; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: #aaa; }
.info b { color: #ddd; }
.stock-panel {
    background: #2a3a2a;
    border: 1px solid #3a5a3a;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}
.stock-title { color: #8b8; font-weight: 600; }
.stock-list { color: #ccc; flex: 1; }
.btn-clear-stock { background: #833; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; }
label { display: block; color: #bbb; margin-bottom: 6px; }
textarea {
    width: 100%;
    height: 150px;
    background: #4a4a4a;
    border: 1px solid #555;
    border-radius: 8px;
    color: #fff;
    padding: 12px;
    resize: vertical;
    font-size: 14px;
    font-family: monospace;
    line-height: 1.6;
}
.hint { color: #888; font-size: 12px; margin-top: 5px; }
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.btn {
    flex: 1;
    border: none;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
}
.btn-calculate { background: #5a8; color: #fff; }
.btn-clear { background: #555; color: #ddd; }
.btn-share { background: #48a; color: #fff; flex: 0.5; }
.results { margin-top: 18px; display: none; }
.results.show { display: block; }
.size-block { background: #333; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
.size-header { color: #fff; font-size: 15px; margin-bottom: 8px; font-weight: 600; }
.size-row { display: flex; justify-content: space-between; color: #ccc; padding: 2px 0; }
.val { color: #6f6; font-weight: 700; }
.detail { margin-top: 6px; font-size: 11px; color: #888; line-height: 1.5; }
.summary { background: #444; border-radius: 8px; padding: 14px; margin-top: 12px; }
.summary-row { display: flex; justify-content: space-between; color: #fff; font-size: 16px; font-weight: 700; }
.error { color: #f88; margin-top: 12px; display: none; }
.error.show { display: block; }
</style>
</head>

<body>

<div class="app">

<h1>рЯУР –†–∞—Б—З—С—В –њ—А–Њ—А–µ–Ј–Њ–≤</h1>

<div class="info">
<b>–†–µ–є–Ї–∞:</b> 270 —Б–Љ &nbsp;|&nbsp; <b>–Ч–∞–≥—А—Г–Ј–Ї–∞:</b> 26 —И—В. &nbsp;|&nbsp; <b>–Ф–µ—В–∞–ї–µ–є –љ–∞ –њ–Њ–і—А–∞–Љ–љ–Є–Ї:</b> 4
</div>

<div class="stock-panel">
    <span class="stock-title">рЯУ¶ –°–Ї–ї–∞–і:</span>
    <span class="stock-list" id="stockList">–њ—Г—Б—В–Њ</span>
    <button class="btn-clear-stock" onclick="clearStock()">–Ю—З–Є—Б—В–Є—В—М</button>
</div>

<label>–Т–≤–µ–і–Є—В–µ –Ј–∞–Ї–∞–Ј:</label>
<textarea id="inputData" placeholder="30x50 вАФ 100
20x30 вАФ 350"></textarea>
<div class="hint">–§–Њ—А–Љ–∞—В: –®–Є—А–Є–љ–∞ x –Т—Л—Б–Њ—В–∞ вАФ –Ъ–Њ–ї–Є—З–µ—Б—В–≤–Њ</div>

<div class="btn-row">
    <button class="btn btn-calculate" onclick="calc()">–†–∞—Б—Б—З–Є—В–∞—В—М</button>
    <button class="btn btn-clear" onclick="clearInput()">–Ю—З–Є—Б—В–Є—В—М</button>
    <button class="btn btn-share" onclick="shareResult()">рЯУ§</button>
</div>

<div class="error" id="error"></div>
<div class="results" id="results"></div>

</div>

<script>

var REIKA = 270;
var LOAD = 26;
var stock = {};
var lastText = '';

function loadStock() {
    try { stock = JSON.parse(localStorage.getItem('pod_v17')) || {}; } catch(e) { stock = {}; }
    renderStock();
}

function saveStock() {
    localStorage.setItem('pod_v17', JSON.stringify(stock));
    renderStock();
}

function renderStock() {
    var list = document.getElementById('stockList');
    var arr = [];
    for (var k in stock) {
        if (stock[k] > 0) arr.push([+k, stock[k]]);
    }
    list.textContent = arr.length
        ? arr.sort(function(a,b) { return a[0] - b[0]; })
            .map(function(e) { return e[0] + '—Б–Љ √Ч' + e[1]; })
            .join(', ')
        : '–њ—Г—Б—В–Њ';
}

function clearStock() {
    if (confirm('–Ю—З–Є—Б—В–Є—В—М —Б–Ї–ї–∞–і?')) { stock = {}; saveStock(); }
}

function parseInput(text) {
    var items = [];
    text.split('\n').forEach(function(line) {
        var m = line.match(/(\d+)\s*[x—Е√Ч]\s*(\d+)\s*[-вАФвАУ]\s*(\d+)/i);
        if (m) { items.push({ w: +m[1], h: +m[2], q: +m[3] }); }
    });
    return items;
}

function calc() {
    var input = document.getElementById('inputData').value.trim();
    var errEl = document.getElementById('error');
    var resEl = document.getElementById('results');

    errEl.classList.remove('show');
    resEl.classList.remove('show');

    if (!input) {
        errEl.textContent = '–Т–≤–µ–і–Є—В–µ –Ј–∞–Ї–∞–Ј';
        errEl.classList.add('show');
        return;
    }

    var items = parseInput(input);

    if (!items.length) {
        errEl.textContent = '–Э–µ–≤–µ—А–љ—Л–є —Д–Њ—А–Љ–∞—В';
        errEl.classList.add('show');
        return;
    }

    // –Я–Њ—В—А–µ–±–љ–Њ—Б—В–Є
    var need = {};
    items.forEach(function(it) {
        need[it.w] = (need[it.w] || 0) + it.q * 2;
        need[it.h] = (need[it.h] || 0) + it.q * 2;
    });

    // –°–Ї–ї–∞–і
    var fromStock = {};
    for (var k in stock) {
        var sz = +k;
        if (need[sz] > 0 && stock[k] > 0) {
            var take = Math.min(need[sz], stock[k]);
            need[sz] -= take;
            stock[k] -= take;
            fromStock[sz] = (fromStock[sz] || 0) + take;
        }
    }

    // –†–∞–Ј–Љ–µ—А—Л –Њ—В –±–Њ–ї—М—И–Є—Е –Ї –Љ–µ–љ—М—И–Є–Љ
    var sizes = Object.keys(need).map(Number).sort(function(a,b) { return b - a; });

    var cuts = {};
    var det = {};
    var leftovers = [];

    sizes.forEach(function(sz) {
        var needed = need[sz] || 0;
        var fromLeft = 0;

        // –Ю—Б—В–∞—В–Ї–Є
        var newLeft = [];
        leftovers.forEach(function(rest) {
            if (needed <= 0) { newLeft.push(rest); return; }
            if (rest >= sz) {
                var can = Math.floor(rest / sz);
                var take = Math.min(can, needed);
                needed -= take;
                fromLeft += take;
                rest -= take * sz;
            }
            if (rest > 0) newLeft.push(rest);
        });
        leftovers = newLeft;

        // –Э–Њ–≤—Л–µ —А–µ–є–Ї–Є
        var perReika = Math.floor(REIKA / sz);
        var reiki = 0;

        if (needed > 0 && perReika > 0) {
            reiki = Math.ceil(needed / perReika);
            // –Я–†–Ю–†–Х–Ч–Ђ = —А–µ–є–Ї–Є / 26
            cuts[sz] = Math.ceil(reiki / LOAD);

            var restLen = REIKA - (perReika * sz);
            for (var i = 0; i < reiki; i++) {
                if (restLen > 0) leftovers.push(restLen);
            }
        } else {
            cuts[sz] = 0;
        }

        det[sz] = {
            perReika: perReika,
            reiki: reiki,
            fromLeft: fromLeft,
            fromStock: fromStock[sz] || 0
        };
    });

    // –Ю—Б—В–∞—В–Ї–Є –љ–∞ —Б–Ї–ї–∞–і
    leftovers.forEach(function(rest) {
        if (rest > 0 && (rest < 9 || (rest >= 30 && rest <= 33))) {
            stock[rest] = (stock[rest] || 0) + 1;
        }
    });
    saveStock();

    // –Т—Л–≤–Њ–і
    var html = '';
    var totalCuts = 0;
    var counted = {};
    var textOut = 'рЯУР –†–∞—Б—З—С—В –њ—А–Њ—А–µ–Ј–Њ–≤\n–†–µ–є–Ї–∞: ' + REIKA + ' —Б–Љ | –Ч–∞–≥—А—Г–Ј–Ї–∞: ' + LOAD + ' —И—В.\n\n';

    items.forEach(function(it) {
        var w = it.w, h = it.h, q = it.q;

        var cw = 0, ch = 0;
        if (!counted[w]) { cw = cuts[w] || 0; counted[w] = true; }
        if (!counted[h]) { ch = cuts[h] || 0; counted[h] = true; }

        var sum = cw + ch;
        totalCuts += sum;

        var dw = det[w] || {}, dh = det[h] || {};

        html +=
        '<div class="size-block">' +
            '<div class="size-header">рЯУП ' + w + '√Ч' + h + ' вАФ ' + q + ' —И—В.</div>' +
            '<div class="size-row"><span>–Я—А–Њ—А–µ–Ј–Њ–≤ –≤ ' + w + '</span><span class="val">' + cw + ' —И—В.</span></div>' +
            '<div class="size-row"><span>–Я—А–Њ—А–µ–Ј–Њ–≤ –≤ ' + h + '</span><span class="val">' + ch + ' —И—В.</span></div>' +
            '<div class="detail">' +
                w + '—Б–Љ: ' + (dw.perReika || 0) + ' —И—В/—А–µ–є–Ї–∞, —А–µ–µ–Ї: ' + (dw.reiki || 0) +
                ', –Є–Ј –Њ—Б—В–∞—В–Ї–Њ–≤: ' + (dw.fromLeft || 0) + ', —Б–Њ —Б–Ї–ї–∞–і–∞: ' + (dw.fromStock || 0) +
                ' | ' +
                h + '—Б–Љ: ' + (dh.perReika || 0) + ' —И—В/—А–µ–є–Ї–∞, —А–µ–µ–Ї: ' + (dh.reiki || 0) +
                ', –Є–Ј –Њ—Б—В–∞—В–Ї–Њ–≤: ' + (dh.fromLeft || 0) + ', —Б–Њ —Б–Ї–ї–∞–і–∞: ' + (dh.fromStock || 0) +
            '</div>' +
        '</div>';

        textOut += w + '√Ч' + h + ' вАФ ' + q + ' —И—В. вЖТ ' + sum + ' –њ—А–Њ—А–µ–Ј–Њ–≤\n';
    });

    html +=
    '<div class="summary">' +
        '<div class="summary-row">' +
            '<span>рЯФ™ –Т—Б–µ–≥–Њ –њ—А–Њ—А–µ–Ј–Њ–≤:</span>' +
            '<span>' + totalCuts + ' —И—В.</span>' +
        '</div>' +
    '</div>';

    textOut += '\nрЯФ™ –Т—Б–µ–≥–Њ: ' + totalCuts + ' —И—В.';

    var stockArr = [];
    for (var k in stock) { if (stock[k] > 0) stockArr.push([+k, stock[k]]); }
    if (stockArr.length) {
        textOut += '\nрЯУ¶ –°–Ї–ї–∞–і: ' + stockArr.sort(function(a,b) { return a[0] - b[0]; })
            .map(function(e) { return e[0] + '—Б–Љ √Ч' + e[1]; }).join(', ');
    }

    resEl.innerHTML = html;
    resEl.classList.add('show');
    lastText = textOut;
}

function shareResult() {
    if (!lastText) { alert('–°–љ–∞—З–∞–ї–∞ —А–∞—Б—Б—З–Є—В–∞–є—В–µ'); return; }
    if (navigator.share) { navigator.share({ text: lastText }); }
    else { alert(lastText); }
}

function clearInput() {
    document.getElementById('inputData').value = '';
    document.getElementById('results').classList.remove('show');
    document.getElementById('error').classList.remove('show');
}

loadStock();

</script>

</body>
</html>
